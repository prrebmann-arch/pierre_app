<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pierre Coaching - App</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --primary: #B30808;
    --primary-dark: #8a0606;
    --primary-light: #d40a0a;
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --bg4: #2e2e2e;
    --text: #ffffff;
    --text2: #b0b0b0;
    --text3: #707070;
    --border: #333333;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ===== AUTH ===== */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f0f0f 0%, #1a0505 100%);
    padding: 20px;
  }
  .auth-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow);
  }
  .auth-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .auth-logo-text {
    font-size: 28px;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -1px;
  }
  .auth-subtitle { color: var(--text2); font-size: 14px; margin-top: 4px; }
  .auth-tabs {
    display: flex;
    background: var(--bg3);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .auth-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    transition: all 0.2s;
    border: none;
    background: none;
  }
  .auth-tab.active { background: var(--primary); color: white; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
  .btn-primary {
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ===== APP LAYOUT ===== */
  #app-screen { display: none; min-height: 100vh; }
  .app-layout { display: flex; min-height: 100vh; }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
  }
  .sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-user {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .user-avatar {
    width: 40px; height: 40px;
    background: var(--primary);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px;
  }
  .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 12px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text2);
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    margin-bottom: 2px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: rgba(179,8,8,0.15); color: var(--primary); }

  /* ===== MAIN CONTENT ===== */
  .main-content {
    margin-left: 260px;
    flex: 1;
    padding: 32px;
    min-height: 100vh;
  }
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .page-title { font-size: 26px; font-weight: 700; }

  /* ===== CARDS ===== */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .card-title { font-size: 16px; font-weight: 600; }

  /* ===== BUTTONS ===== */
  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .btn-red { background: var(--primary); color: white; }
  .btn-red:hover { background: var(--primary-dark); }
  .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* ===== ATHLETE TABS ===== */
  .athlete-tab-btn {
    background: transparent;
    border: none;
    color: var(--text2);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .athlete-tab-btn.active {
    background: var(--primary);
    color: white;
  }
  .athlete-tab-btn:hover:not(.active) {
    background: var(--bg3);
    color: var(--text);
  }

  /* ===== ATHLETE CARD CLICKABLE ===== */
  .athlete-card {
    cursor: pointer;
    transition: all 0.2s;
  }
  .athlete-card:hover {
    transform: translateY(-2px);
    border-color: var(--primary);
  }

  /* ===== TOGGLE SWITCH ===== */
  .toggle-switch {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .toggle-switch input {
    display: none;
  }
  .toggle-switch .switch {
    width: 44px;
    height: 24px;
    background: var(--border);
    border-radius: 12px;
    position: relative;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .toggle-switch input:checked + .switch {
    background: var(--primary);
  }
  .toggle-switch .switch::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: left 0.3s;
  }
  .toggle-switch input:checked + .switch::after {
    left: 22px;
  }

  /* ===== TRAINING PATTERN ===== */
  .training-day {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .training-day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .exercise-item {
    background: var(--bg4);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* ===== NUTRITION R1-R8 ===== */
  .meal-row {
    background: var(--bg3);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }
  .meal-header {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 10px;
    color: var(--primary);
  }
  .food-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    background: var(--bg4);
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 13px;
  }

  /* ===== BILANS TABLE ===== */
  .bilans-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .bilans-table th {
    background: var(--bg3);
    padding: 10px 8px;
    text-align: center;
    font-weight: 600;
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--text3);
  }
  .bilans-table td {
    padding: 8px;
    text-align: center;
    border: 1px solid var(--border);
    color: var(--text2);
  }
  .bilans-table tr.week-avg {
    background: rgba(179,8,8,0.1);
    font-weight: 700;
  }
  .bilans-table tr.week-spacer {
    height: 12px;
    background: var(--bg);
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    padding: 20px;
    display: none;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .modal-title { font-size: 18px; font-weight: 600; }
  .modal-close {
    background: none; border: none; color: var(--text3);
    font-size: 20px; cursor: pointer; padding: 4px 8px;
    border-radius: 6px; transition: all 0.2s;
  }
  .modal-close:hover { background: var(--bg3); color: var(--text); }

  /* ===== FORM ===== */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text3);
  }

  /* ===== NOTIFICATION ===== */
  .notification {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 4px solid var(--primary);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 14px;
    z-index: 9998;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow);
    transform: translateX(120%);
    transition: transform 0.3s;
  }
  .notification.show { transform: translateX(0); }
  .notification.success { border-left-color: var(--success); }
  .notification.error { border-left-color: var(--danger); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .main-content { margin-left: 0; padding: 16px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-text">Pierre Coaching</div>
      <div class="auth-subtitle">Espace Coach</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Connexion</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Inscription</button>
    </div>
    <form id="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="auth-email" required>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="auth-password" required>
      </div>
      <button type="submit" class="btn-primary" id="auth-submit">Se connecter</button>
    </form>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="app-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="auth-logo-text">Pierre Coaching</div>
      </div>
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">C</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Coach</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="showSection('athletes')">
          <i class="fas fa-users"></i> Athlètes
        </button>
        <button class="nav-item" onclick="showSection('templates')">
          <i class="fas fa-copy"></i> Templates
        </button>
        <button class="nav-item" onclick="showSection('aliments')">
          <i class="fas fa-apple-alt"></i> Aliments
        </button>
        <button class="nav-item" onclick="showSection('business')">
          <i class="fas fa-chart-line"></i> Business
        </button>
      </nav>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <!-- ATHLETES SECTION -->
      <div id="athletes-section" class="section active">
        <div class="page-header">
          <div>
            <h1 class="page-title">Athlètes</h1>
          </div>
          <button class="btn btn-red" onclick="openModal('modal-athlete')">
            <i class="fas fa-plus"></i> Ajouter un athlète
          </button>
        </div>
        <div id="athletes-list"></div>
      </div>

      
      <!-- ATHLETE DETAIL SECTION -->
      <div id="athlete-detail-section" class="section">
        <div class="page-header">
          <button class="btn btn-outline" onclick="backToAthletesList()">
            <i class="fas fa-arrow-left"></i> Retour
          </button>
          <h1 class="page-title" id="athlete-detail-name">Athlète</h1>
        </div>
        
        <!-- Tabs -->
        <div style="display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 8px;">
          <button class="athlete-tab-btn active" onclick="switchAthleteTab('infos')">
            <i class="fas fa-user"></i> Infos
          </button>
          <button class="athlete-tab-btn" onclick="switchAthleteTab('training')">
            <i class="fas fa-dumbbell"></i> Training
          </button>
          <button class="athlete-tab-btn" onclick="switchAthleteTab('nutrition')">
            <i class="fas fa-utensils"></i> Nutrition
          </button>
          <button class="athlete-tab-btn" onclick="switchAthleteTab('bilans')">
            <i class="fas fa-chart-line"></i> Bilans
          </button>
        </div>
        
        <div id="athlete-tab-content">
          <!-- Content loaded dynamically -->
        </div>
      </div>

      <!-- TEMPLATES SECTION -->
      <div id="templates-section" class="section">
        <div class="page-header">
          <h1 class="page-title">Templates</h1>
        </div>
        
        <div style="display: flex; gap: 8px; margin-bottom: 24px;">
          <button class="btn btn-outline active" onclick="switchTemplateTab('training')">
            <i class="fas fa-dumbbell"></i> Training
          </button>
          <button class="btn btn-outline" onclick="switchTemplateTab('nutrition')">
            <i class="fas fa-utensils"></i> Nutrition
          </button>
        </div>
        
        <div id="templates-content"></div>
      </div>

      <!-- ALIMENTS SECTION -->
      <div id="aliments-section" class="section">
        <div class="page-header">
          <h1 class="page-title">Base d'aliments</h1>
          <button class="btn btn-red" onclick="openModal('modal-aliment')">
            <i class="fas fa-plus"></i> Ajouter un aliment
          </button>
        </div>
        <div id="aliments-list"></div>
      </div>

      <!-- BUSINESS SECTION -->
      <div id="business-section" class="section" style="padding:0; height:100vh;">
        <iframe src="business.html" style="width:100%; height:100%; border:none; display:block;"></iframe>
      </div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-athlete">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Ajouter un athlète</h2>
      <button class="modal-close" onclick="closeModal('modal-athlete')">×</button>
    </div>
    <form id="athlete-form">
      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" id="athlete-prenom" required>
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" id="athlete-nom" required>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="athlete-email" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Poids actuel (kg)</label>
          <input type="number" id="athlete-poids" step="0.1">
        </div>
        <div class="form-group">
          <label>Objectif poids (kg)</label>
          <input type="number" id="athlete-poids-obj" step="0.1">
        </div>
      </div>
      <div class="form-group">
        <label>Objectif</label>
        <select id="athlete-objectif">
          <option value="prise_masse">Prise de masse</option>
          <option value="seche">Sèche</option>
          <option value="maintenance">Maintenance</option>
        </select>
      </div>
      <button type="submit" class="btn btn-red">Ajouter l'athlète</button>
    </form>
  </div>
</div>

<div class="modal-overlay" id="modal-programme">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Nouveau programme</h2>
      <button class="modal-close" onclick="closeModal('modal-programme')">×</button>
    </div>
    <form id="programme-form">
      <div class="form-group">
        <label>Nom du programme</label>
        <input type="text" id="programme-nom" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="programme-description">
      </div>
      <div class="form-group">
        <label>Athlète</label>
        <select id="programme-athlete" required>
          <option value="">Sélectionner un athlète</option>
        </select>
      </div>
      <button type="submit" class="btn btn-red">Créer le programme</button>
    </form>
  </div>
</div>

<div class="modal-overlay" id="modal-nutrition">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Nouveau plan nutrition</h2>
      <button class="modal-close" onclick="closeModal('modal-nutrition')">×</button>
    </div>
    <form id="nutrition-form">
      <div class="form-group">
        <label>Nom du plan</label>
        <input type="text" id="nutrition-nom" required>
      </div>
      <div class="form-group">
        <label>Athlète</label>
        <select id="nutrition-athlete" required>
          <option value="">Sélectionner un athlète</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Calories objectif</label>
          <input type="number" id="nutrition-calories">
        </div>
        <div class="form-group">
          <label>Protéines (g)</label>
          <input type="number" id="nutrition-proteines">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Glucides (g)</label>
          <input type="number" id="nutrition-glucides">
        </div>
        <div class="form-group">
          <label>Lipides (g)</label>
          <input type="number" id="nutrition-lipides">
        </div>
      </div>
      <button type="submit" class="btn btn-red">Créer le plan</button>
    </form>
  </div>
</div>

<div class="modal-overlay" id="modal-aliment">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Ajouter un aliment</h2>
      <button class="modal-close" onclick="closeModal('modal-aliment')">×</button>
    </div>
    <form id="aliment-form">
      <div class="form-group">
        <label>Nom de l'aliment</label>
        <input type="text" id="aliment-nom" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Calories (100g)</label>
          <input type="number" id="aliment-calories" required>
        </div>
        <div class="form-group">
          <label>Protéines (g)</label>
          <input type="number" id="aliment-proteines" step="0.1">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Glucides (g)</label>
          <input type="number" id="aliment-glucides" step="0.1">
        </div>
        <div class="form-group">
          <label>Lipides (g)</label>
          <input type="number" id="aliment-lipides" step="0.1">
        </div>
      </div>
      <button type="submit" class="btn btn-red">Ajouter l'aliment</button>
    </form>
  </div>
</div>

<!-- MODAL EDIT ALIMENT -->
<div class="modal-overlay" id="modal-edit-aliment">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Modifier l'aliment</h2>
      <button class="modal-close" onclick="closeModal('modal-edit-aliment')">×</button>
    </div>
    <form id="edit-aliment-form">
      <div class="form-group">
        <label>Nom de l'aliment</label>
        <input type="text" id="edit-aliment-nom" required>
      </div>
      <div class="form-row">

function tpEsc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function buildTpExerciseHtml(exData) {
  const inp = 'background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;text-align:center;';
  const opts = '<option value="">— exercice —</option>' + (window.exercicesDB || []).map(ex => {
    const sel = (exData && (String(exData.exercice_id) === String(ex.id) || exData.nom === ex.nom)) ? ' selected' : '';
    return `<option value="${ex.id}" data-nom="${tpEsc(ex.nom)}"${sel}>${tpEsc(ex.nom)}${ex.muscle_principal ? ' — ' + tpEsc(ex.muscle_principal) : ''}</option>`;
  }).join('');
  return `
    <div class="exercise-item tp-ex-row" style="flex-wrap:wrap;gap:6px;margin-bottom:6px;">
      <select style="flex:2;min-width:160px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;">${opts}</select>
      <input type="number" class="tp-ex-series" value="${tpEsc(exData?.series||'')}" placeholder="Séries" style="width:60px;${inp}" min="1">
      <input type="text" class="tp-ex-reps" value="${tpEsc(exData?.reps||'')}" placeholder="Reps" style="width:70px;${inp}">
      <input type="number" class="tp-ex-charge" value="${tpEsc(exData?.charge||'')}" placeholder="Charge kg" style="width:80px;${inp}" step="0.5">
      <button type="button" class="btn btn-outline btn-sm" style="color:var(--danger);" onclick="this.closest('.tp-ex-row').remove()">×</button>
    </div>`;
}

function buildTpSessionHtml(sessionData) {
  const exHtml = (sessionData?.exercises?.length ? sessionData.exercises : [null]).map(ex => buildTpExerciseHtml(ex)).join('');
  return `
    <div class="training-day tp-session-row" style="margin-bottom:12px;">
      <div class="training-day-header">
        <div style="display:flex;gap:8px;flex:1;">
          <input type="text" class="tp-session-nom" placeholder="Nom séance (ex: Haut du corps)" value="${tpEsc(sessionData?.nom||'')}"
            style="flex:1;background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;">
          <input type="text" class="tp-session-jour" placeholder="Jour (optionnel)" value="${tpEsc(sessionData?.jour||'')}"
            style="width:130px;background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;">
        </div>
        <button type="button" class="btn btn-outline btn-sm" style="color:var(--danger);margin-left:8px;" onclick="this.closest('.tp-session-row').remove()">
          <i class="fas fa-trash"></i>
        </button>
      </div>
      <div class="tp-exercises-list" style="margin-top:10px;">${exHtml}</div>
      <button type="button" class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="this.previousElementSibling.insertAdjacentHTML('beforeend', buildTpExerciseHtml(null))">
        <i class="fas fa-plus"></i> Exercice
      </button>
    </div>`;
}

function getTpSessionsData() {
  const sessions = [];
  document.querySelectorAll('#tp-sessions .tp-session-row').forEach(row => {
    const nom = row.querySelector('.tp-session-nom')?.value?.trim() || '';
    const jour = row.querySelector('.tp-session-jour')?.value?.trim() || '';
    const exercises = [];
    row.querySelectorAll('.tp-ex-row').forEach(exRow => {
      const sel = exRow.querySelector('select');
      const selectedOpt = sel?.options[sel?.selectedIndex];
      const nomEx = selectedOpt?.dataset.nom || '';
      if (nomEx) {
        exercises.push({
          nom: nomEx,
          exercice_id: sel?.value || null,
          series: exRow.querySelector('.tp-ex-series')?.value || '-',
          reps: exRow.querySelector('.tp-ex-reps')?.value || '-',
          charge: exRow.querySelector('.tp-ex-charge')?.value || null
        });
      }
    });
    sessions.push({ nom, jour, exercises });
  });
  return sessions;
}

  const pg = document.getElementById('tp-pattern-group');
  const fg = document.getElementById('tp-fixed-group');

  if (fg) fg.style.display = type === 'fixed' ? 'block' : 'none';
}

async function saveTrainingProgramInline() {
  const nom = document.getElementById('tp-nom')?.value?.trim();
  if (!nom) { notify('Le nom est obligatoire', 'error'); return; }
  const patternType = document.getElementById('tp-type')?.value || 'pattern';
  const patternData = patternType === 'pattern'
    ? { pattern: document.getElementById('tp-pattern')?.value || '' }
    : { days: (document.getElementById('tp-fixed')?.value || '').split(',').map(d => d.trim()).filter(Boolean) };
  const sessions = getTpSessionsData();
  console.log('💾 Sauvegarde programme:', nom, 'Sessions:', sessions.length, sessions);
  let programId = window._tpEditId;
  if (programId) {
    const { error } = await supabaseClient.from('workout_programs').update({ nom, pattern_type: patternType, pattern_data: patternData }).eq('id', programId);
    if (error) { notify('Erreur: ' + error.message, 'error'); return; }
    await supabaseClient.from('workout_sessions').delete().eq('program_id', programId);
  } else {
    const { data, error } = await supabaseClient.from('workout_programs').insert({ nom, athlete_id: currentAthleteId, coach_id: currentUser.id, pattern_type: patternType, pattern_data: patternData }).select();
    if (error) { notify('Erreur: ' + error.message, 'error'); return; }
    programId = data[0].id;
  }
  for (let i = 0; i < sessions.length; i++) {
    const s = sessions[i];
    const { data, error } = await supabaseClient.from('workout_sessions').insert({ nom: s.nom, jour: s.jour || null, program_id: programId, exercices: JSON.stringify(s.exercises), ordre: i });
    if (error) { console.error('❌ Erreur insertion session:', error); notify('Erreur: ' + error.message, 'error'); return; }
    console.log('✅ Session créée:', s.nom);
  }
  notify('Programme sauvegardé !', 'success');
  window._tpEditId = null;
  loadAthleteTabTraining();
}

    <input type="text" placeholder="kcal" readonly style="width: 60px; background: var(--bg2); border: none; outline: none; text-align: center; color: var(--text3);">

    <button type="button" class="btn btn-outline btn-sm" onclick="this.parentElement.remove()">-</button>
  `;

function calculateFoodMacros(qteInput) {
  const foodItem = qteInput.parentElement;
  if (!foodItem) return;
  
  const select = foodItem.querySelector('select');
  if (!select) return;
  const qte = parseFloat(qteInput.value) || 0;
  
  if (select.value) {
    const option = select.options[select.selectedIndex];
    const calPer100g = parseFloat(option.dataset.cal) || 0;
    const protPer100g = parseFloat(option.dataset.prot) || 0;
    const glucPer100g = parseFloat(option.dataset.gluc) || 0;
    const lipPer100g = parseFloat(option.dataset.lip) || 0;
    
    const inputs = foodItem.querySelectorAll('input[type="text"]');
    inputs[0].value = (calPer100g * qte).toFixed(0);
    inputs[1].value = (protPer100g * qte).toFixed(1);
    inputs[2].value = (glucPer100g * qte).toFixed(1);
    inputs[3].value = (lipPer100g * qte).toFixed(1);
  }
}

const PROG_PHASES = {
  seche:          { label: 'SÈCHE',         color: '#c0392b' },
  reverse:        { label: 'REVERSE',        color: '#2471a3' },
  prise_de_masse: { label: 'PRISE DE MASSE', color: '#1e8449' },
};

function progEsc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function progFmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('fr-FR', { day:'2-digit', month:'short' });
}

async function loadProgrammingWeeks() {
  const [{ data: weeks }, { data: programs }] = await Promise.all([
    supabaseClient.from('programming_weeks').select('*').eq('athlete_id', currentAthleteId).order('week_date'),
    supabaseClient.from('workout_programs').select('id,nom').eq('athlete_id', currentAthleteId).order('created_at'),
  ]);
  window._progWeeksCache = weeks || [];
  window._progPrograms = programs || [];
  renderProgrammingTable(window._progWeeksCache);
}

function renderProgrammingTable(weeks) {
  const c = document.getElementById('prog-table-container');
  if (!c) return;
  if (!weeks.length) {
    c.innerHTML = `<div style="text-align:center;color:var(--text3);padding:30px;">Aucune semaine planifiée — utilise <strong>Générer semaines</strong> pour démarrer.</div>`;
    return;
  }
  const today = new Date().toISOString().split('T')[0];
  const programs = window._progPrograms || [];
  const rows = weeks.map((w, i) => {
    const nextDate = weeks[i + 1]?.week_date;
    const isCurrent = w.week_date <= today && (!nextDate || nextDate > today);
    const phase = PROG_PHASES[w.phase];
    const phaseBadge = phase
      ? `<span style="background:${phase.color};color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap;">${phase.label}</span>`
      : `<span style="color:var(--text3);">—</span>`;
    const progName = programs.find(p => p.id === w.training_program_id)?.nom || '—';
    const rowStyle = isCurrent
      ? 'background:rgba(99,102,241,0.08);border-left:3px solid var(--primary);'
      : 'border-left:3px solid transparent;';
    return `<tr id="prog-row-${w.id}" style="${rowStyle}">
      <td style="padding:7px 8px;font-size:12px;color:var(--text3);">${i + 1}</td>
      <td style="padding:7px 8px;font-size:12px;white-space:nowrap;font-weight:${isCurrent?'700':'400'};">${progFmtDate(w.week_date)}</td>
      <td style="padding:7px 8px;font-size:12px;max-width:160px;">${w.details ? progEsc(w.details) : '<span style="color:var(--text3);">—</span>'}</td>
      <td style="padding:7px 8px;">${phaseBadge}</td>
      <td style="padding:7px 8px;font-size:12px;">${progName !== '—' ? `<span style="font-size:11px;">${progEsc(progName)}</span>` : '<span style="color:var(--text3);">—</span>'}</td>
      <td style="padding:7px 8px;font-size:12px;text-align:center;">${w.pdc_moyenne ? `<strong>${w.pdc_moyenne}</strong>` : '<span style="color:var(--text3);">—</span>'}</td>
      <td style="padding:7px 8px;font-size:12px;max-width:200px;color:var(--text3);">${w.notes_bloc ? progEsc(w.notes_bloc) : ''}</td>
      <td style="padding:7px 8px;">
        <button class="btn btn-outline btn-sm" onclick="editProgRow('${w.id}')" title="Modifier"><i class="fas fa-pen"></i></button>
      </td>
    </tr>`;
  }).join('');
  c.innerHTML = `<div style="overflow-x:auto;">
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr style="border-bottom:1px solid var(--border);">
        <th style="padding:8px;text-align:left;font-size:11px;color:var(--text3);">SEM</th>
        <th style="padding:8px;text-align:left;font-size:11px;color:var(--text3);">DATE</th>
        <th style="padding:8px;text-align:left;font-size:11px;color:var(--text3);">DÉTAILS</th>
        <th style="padding:8px;text-align:left;font-size:11px;color:var(--text3);">PHASE</th>
        <th style="padding:8px;text-align:left;font-size:11px;color:var(--text3);">TRAINING</th>
        <th style="padding:8px;text-align:center;font-size:11px;color:var(--text3);">PDC MOY.</th>
        <th style="padding:8px;text-align:left;font-size:11px;color:var(--text3);">NOTES BLOC</th>
        <th style="padding:8px;"></th>
      </tr></thead>
      <tbody id="prog-tbody">${rows}</tbody>
    </table>
  </div>`;
}

function showProgGenerateForm() {
  const f = document.getElementById('prog-generate-form');
  if (f) { f.style.display = f.style.display === 'none' ? 'block' : 'none'; }
}

async function generateProgWeeks() {
  const dateVal = document.getElementById('prog-gen-date')?.value;
  const count = parseInt(document.getElementById('prog-gen-count')?.value) || 0;
  if (!dateVal || count < 1) { notify('Date et nombre de semaines requis', 'warning'); return; }
  const rows = [];
  const start = new Date(dateVal + 'T00:00:00');
  for (let i = 0; i < count; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i * 7);
    rows.push({ athlete_id: currentAthleteId, coach_id: currentUser.id, week_date: d.toISOString().split('T')[0] });
  }
  const { error } = await supabaseClient.from('programming_weeks').insert(rows);
  if (error) { notify('Erreur: ' + error.message, 'error'); return; }
  document.getElementById('prog-generate-form').style.display = 'none';
  await loadProgrammingWeeks();
  notify(`${count} semaines générées`, 'success');
}

async function addProgWeek() {
  const weeks = window._progWeeksCache || [];
  let nextDate = new Date();
  if (weeks.length) {
    const last = new Date(weeks[weeks.length - 1].week_date + 'T00:00:00');
    last.setDate(last.getDate() + 7);
    nextDate = last;
  }
  const { error } = await supabaseClient.from('programming_weeks').insert({
    athlete_id: currentAthleteId, coach_id: currentUser.id,
    week_date: nextDate.toISOString().split('T')[0]
  });
  if (error) { notify('Erreur: ' + error.message, 'error'); return; }
  await loadProgrammingWeeks();
}

function editProgRow(id) {

  if (!w) return;
  const row = document.getElementById('prog-row-' + id);
  if (!row) return;

    `<option value="${p.id}"${w.training_program_id === p.id ? ' selected' : ''}>${progEsc(p.nom)}</option>`).join('');
  const phaseOpts = '<option value="">— phase —</option>' + Object.entries(PROG_PHASES).map(([k, v]) =>
    `<option value="${k}"${w.phase === k ? ' selected' : ''}>${v.label}</option>`).join('');
  row.innerHTML = `
    <td style="padding:6px;font-size:12px;color:var(--text3);">${idx + 1}</td>

    <td style="padding:6px;"><select id="pew-${id}-phase" style="${inp}">${phaseOpts}</select></td>
    <td style="padding:6px;"><select id="pew-${id}-prog" style="${inp}">${progOpts}</select></td>
    <td style="padding:6px;"><input type="number" id="pew-${id}-pdc" value="${w.pdc_moyenne||''}" step="0.1" placeholder="kg" style="${inp}width:65px;"></td>
    <td style="padding:6px;"><input type="text" id="pew-${id}-notes" value="${progEsc(w.notes_bloc||'')}" placeholder="Notes..." style="${inp}width:100%;"></td>
    <td style="padding:6px;white-space:nowrap;display:flex;gap:4px;">
      <button class="btn btn-red btn-sm" onclick="saveProgRow('${id}')"><i class="fas fa-check"></i></button>
      <button class="btn btn-outline btn-sm" onclick="renderProgrammingTable(window._progWeeksCache||[])"><i class="fas fa-times"></i></button>
      <button class="btn btn-outline btn-sm" style="color:var(--danger);" onclick="deleteProgRow('${id}')"><i class="fas fa-trash"></i></button>
    </td>`;
}

async function saveProgRow(id) {
  const g = (sfx) => document.getElementById(`pew-${id}-${sfx}`);
  const data = {
    week_date:           g('date')?.value,
    details:             g('details')?.value || null,
    phase:               g('phase')?.value || null,
    training_program_id: g('prog')?.value || null,
    pdc_moyenne:         parseFloat(g('pdc')?.value) || null,
    notes_bloc:          g('notes')?.value || null,
  };
  const { error } = await supabaseClient.from('programming_weeks').update(data).eq('id', id);
  if (error) { notify('Erreur: ' + error.message, 'error'); return; }
  await loadProgrammingWeeks();
  notify('Sauvegardé', 'success');
}

async function deleteProgRow(id) {
  if (!confirm('Supprimer cette semaine ?')) return;
  const { error } = await supabaseClient.from('programming_weeks').delete().eq('id', id);
  if (error) { notify('Erreur: ' + error.message, 'error'); return; }
  await loadProgrammingWeeks();
}

// Activer/Désactiver un programme (et désactiver les autres)
async function toggleTrainingProgram(id, isActive) {
  console.log('🔄 Toggle programme:', id, 'isActive:', isActive);
  try {
    if (isActive) {
      // Désactiver TOUS les autres d'abord
      const { error: err1 } = await supabaseClient
        .from('workout_programs')
        .update({ actif: false })
        .eq('athlete_id', currentAthleteId);
      if (err1) throw err1;
      console.log('✅ Tous désactivés');

      // Puis activer celui-ci
      const { error: err2 } = await supabaseClient
        .from('workout_programs')
        .update({ actif: true })
        .eq('id', id);
      if (err2) throw err2;
      console.log('✅ Celui-ci activé:', id);

      notify('Programme activé !', 'success');
    } else {
      // Désactiver celui-ci
      const { error } = await supabaseClient
        .from('workout_programs')
        .update({ actif: false })
        .eq('id', id);
      if (error) throw error;
      console.log('✅ Désactivé:', id);
      notify('Programme désactivé', 'success');
    }
    loadAthleteTabTraining();
  } catch(error) {
    console.error('❌ Erreur:', error);
    notify('Erreur: ' + error.message, 'error');
    loadAthleteTabTraining();
  }
}

// Supprimer un programme d'entraînement
async function deleteTrainingProgram(id) {
  if (!confirm('Supprimer ce programme et toutes ses séances ?')) return;
  const { error: err1 } = await supabaseClient.from('workout_sessions').delete().eq('program_id', id);
  const { error: err2 } = await supabaseClient.from('workout_programs').delete().eq('id', id);
  if (err1 || err2) { notify('Erreur: ' + (err1?.message || err2?.message), 'error'); return; }
  notify('Programme supprimé !', 'success');
  loadAthleteTabTraining();
}

function renderTrainingProgram(p) {
  let patternDisplay = '';
  if (p.pattern_data) {
    try {
      const pd = typeof p.pattern_data === 'string' ? JSON.parse(p.pattern_data) : p.pattern_data;
      patternDisplay = p.pattern_type === 'pattern' ? (pd.pattern || '') : (pd.days || []).join(' · ');
    } catch(e) {}
  }
  const sessions = (p.workout_sessions || []).sort((a, b) => (a.ordre || 0) - (b.ordre || 0));
  const sessionCount = sessions.length;
  const isActive = p.actif;

  return `
    <div class="card" style="margin-bottom:20px;border:2px solid ${isActive ? 'var(--primary)' : 'var(--border)'};position:relative;">
      ${isActive ? '<div style="position:absolute;top:12px;right:12px;background:var(--primary);color:white;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;">✓ ACTIF</div>' : ''}
      <div class="card-header">
        <div>
          <div class="card-title">${p.nom}</div>
          ${patternDisplay ? `<div style="font-size:13px;color:var(--primary);margin-top:4px;"><i class="fas fa-repeat"></i> ${patternDisplay}</div>` : ''}
          <div style="font-size:12px;color:var(--text3);margin-top:6px;">${sessionCount} séance(s)</div>
        </div>
        <div style="display:flex;gap:12px;align-items:center;">
          <label class="toggle-switch">
            <input type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleTrainingProgram('${p.id}', this.checked)">
            <span class="switch"></span>
            <span style="font-size:12px;color:var(--text2);font-weight:500;">Actif</span>
          </label>
          <button class="btn btn-red btn-sm" onclick="viewAllSessions('${p.id}')"><i class="fas fa-eye"></i></button>

}

function switchNutriTab(type) {
  window.currentNutriTab = type;
  document.getElementById('nutri-tab-training')?.classList.toggle('active', type === 'training');
  document.getElementById('nutri-tab-rest')?.classList.toggle('active', type === 'rest');
  renderNutriTab(type);
}

function renderNutriTab(type) {
  const container = document.getElementById('nutri-tab-content');
  if (!container) return;
  const plan = window.currentNutriPlans?.[type];
  const label = type === 'training' ? "jours d'entraînement" : "jours de repos";
  const mealType = type === 'training' ? 'training' : 'rest';

  if (!plan) {
    container.innerHTML = `
      <div class="card">
        <div class="empty-state">
          <i class="fas fa-utensils"></i>
          <p>Aucun plan pour les ${label}</p>
          <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;">
            <button class="btn btn-outline" onclick="copyNutritionFromTemplateForType('${mealType}')"><i class="fas fa-copy"></i> Copier template</button>
            <button class="btn btn-red" onclick="createNutritionPlanForType('${mealType}')"><i class="fas fa-plus"></i> Créer un plan</button>
          </div>
        </div>
      </div>`;
    return;
  }

  let meals = [];
  if (plan.meals_data) { try { meals = JSON.parse(plan.meals_data); } catch(e) {} }

  // Recalcule les macros depuis alimentsDB pour corriger les vieilles données
  function calcItemMacros(item) {
    const qte = parseFloat(item.qte) || 0;
    const a = (window.alimentsDB || []).find(x => x.nom === (item.aliment || item.nom));
    if (a) {
      return {
        kcal: parseFloat((a.calories  * qte).toFixed(0)),
        p:    parseFloat((a.proteines * qte).toFixed(1)),
        g:    parseFloat((a.glucides  * qte).toFixed(1)),
        l:    parseFloat((a.lipides   * qte).toFixed(1))
      };
    }
    return { kcal: parseFloat(item.kcal)||0, p: parseFloat(item.p)||0, g: parseFloat(item.g)||0, l: parseFloat(item.l)||0 };
  }

  let totalK = 0, totalP = 0, totalG = 0, totalL = 0;
  meals.forEach(meal => { if (Array.isArray(meal)) meal.forEach(item => {
    const m = calcItemMacros(item);
    totalK += m.kcal; totalP += m.p; totalG += m.g; totalL += m.l;
  }); });

  const mealsHtml = meals.map((meal, idx) => {
    if (!Array.isArray(meal)) return '';
    let mk=0,mp=0,mg=0,ml=0;
    meal.forEach(item => { const m=calcItemMacros(item); mk+=m.kcal; mp+=m.p; mg+=m.g; ml+=m.l; });
    return `
      <div class="meal-row">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div class="meal-header" style="margin-bottom:0;">R${idx+1}</div>
          <div style="font-size:12px;font-weight:600;">${mk.toFixed(0)} kcal &nbsp;|&nbsp; P:${mp.toFixed(1)}g &nbsp;G:${mg.toFixed(1)}g &nbsp;L:${ml.toFixed(1)}g</div>
        </div>
        ${meal.map(item => { const m=calcItemMacros(item); return `
          <div class="food-item">
            <div style="flex:1;"><span style="font-weight:500;">${item.aliment||item.nom||'-'}</span><span style="font-size:11px;color:var(--text3);margin-left:8px;">${item.qte}g</span></div>
            <div style="font-size:12px;text-align:right;"><span style="font-weight:600;">${m.kcal} kcal</span><span style="color:var(--text3);margin-left:8px;">P:${m.p}g G:${m.g}g L:${m.l}g</span></div>
          </div>`; }).join('')}
      </div>`;
  }).join('');

  container.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${plan.nom}</div>
        <button class="btn btn-red btn-sm" onclick="editNutritionPlan('${plan.id}')"><i class="fas fa-pen"></i> Modifier</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;padding:16px;background:var(--bg3);border-radius:10px;">
        <div style="text-align:center;"><div style="font-size:24px;font-weight:700;color:var(--primary);">${totalK.toFixed(0)}</div><div style="font-size:11px;color:var(--text3);">Total kcal</div></div>
        <div style="text-align:center;"><div style="font-size:24px;font-weight:700;">${totalP.toFixed(1)}g</div><div style="font-size:11px;color:var(--text3);">Protéines</div></div>
        <div style="text-align:center;"><div style="font-size:24px;font-weight:700;">${totalG.toFixed(1)}g</div><div style="font-size:11px;color:var(--text3);">Glucides</div></div>
        <div style="text-align:center;"><div style="font-size:24px;font-weight:700;">${totalL.toFixed(1)}g</div><div style="font-size:11px;color:var(--text3);">Lipides</div></div>
      </div>
      ${mealsHtml || '<div class="empty-state"><i class="fas fa-utensils"></i><p>Aucun repas</p></div>'}
    </div>
  `;
}

async function loadAthleteTabBilans() {
  const el = document.getElementById('athlete-tab-content');
  el.innerHTML = '<div style="text-align:center;padding:40px;"><i class="fas fa-spinner fa-spin"></i></div>';

  if (!currentAthleteObj) {
    el.innerHTML = `<div class="card"><div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Athlète non sélectionné</p></div></div>`;
    return;
  }

  const { data: bilans, error } = await supabaseClient
    .from('daily_reports')
    .select('*')
    .eq('user_id', currentAthleteObj.user_id)
    .order('date', { ascending: false });

  if (error) {
    el.innerHTML = `<div class="card"><div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Erreur: ${error.message}</p></div></div>`;
    return;
  }

  if (!bilans?.length) {
    el.innerHTML = `<div class="card"><div class="empty-state"><i class="fas fa-chart-line"></i><p>Aucun bilan enregistré</p><p style="font-size:12px;color:var(--text3);margin-top:8px;">L'athlète doit remplir ses check-ins journaliers.</p></div></div>`;
    return;
  }

  const weeks = {};
  bilans.forEach(b => {
    const date = new Date(b.date);
    const week = getWeekNumber(date);
    const key = `${date.getFullYear()}-S${week}`;
    if (!weeks[key]) weeks[key] = [];
    weeks[key].push(b);
  });

  const NCOLS = 18;
  let tableHtml = `
    <div class="card" style="padding:0;">
      <div style="overflow-x:auto;">
        <table class="bilans-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Poids</th>
              <th>Adhérence</th>
              <th>Séances</th>
              <th>Perf./Plaisir</th>
              <th>Cardio</th>
              <th>Pas/NEAT</th>
              <th>Courbatures</th>
              <th>Stress</th>
              <th>Énergie</th>
              <th>Maladie</th>
              <th>Coucher</th>
              <th>Réveil</th>
              <th>Eff. sommeil</th>
              <th>Qual. sommeil</th>
              <th>Positif</th>
              <th>Négatif</th>
              <th>Général</th>
            </tr>
          </thead>
          <tbody>`;

  Object.keys(weeks).sort().reverse().forEach(weekKey => {
    const wb = weeks[weekKey];
    wb.forEach(b => {
      tableHtml += `
        <tr>
          <td>${new Date(b.date).toLocaleDateString('fr-FR')}</td>
          <td>${b.weight ?? '-'}</td>
          <td>${b.adherence ?? '-'}</td>
          <td>${b.sessions_executed ?? '-'}</td>
          <td>${b.enjoyment ?? '-'}</td>
          <td>${b.cardio_minutes ?? '-'}</td>
          <td>${b.steps ?? '-'}</td>
          <td>${b.soreness ?? '-'}</td>
          <td>${b.stress ?? '-'}</td>
          <td>${b.energy ?? '-'}</td>
          <td>${b.illness_signs ?? '-'}</td>
          <td>${b.bedtime ?? '-'}</td>
          <td>${b.wake_time ?? '-'}</td>
          <td>${b.sleep_efficiency ?? '-'}</td>
          <td>${b.sleep_quality ?? '-'}</td>
          <td>${b.positives ? '✓' : '-'}</td>
          <td>${b.negatives ? '✓' : '-'}</td>
          <td>${b.general_notes ? '📝' : '-'}</td>
        </tr>`;
    });

    tableHtml += `
      <tr class="week-avg">
        <td>Moy. ${weekKey}</td>

        <td>${avgWeek(wb,'adherence')}</td>

        <td>${avgWeek(wb,'energy')}</td>
        <td>-</td><td>-</td><td>-</td>
        <td>${avgWeek(wb,'sleep_efficiency')}</td>
        <td>${avgWeek(wb,'sleep_quality')}</td>
        <td>-</td><td>-</td><td>-</td>
      </tr>
      <tr class="week-spacer"><td colspan="${NCOLS}"></td></tr>`;
  });

  tableHtml += `</tbody></table></div></div>`;
  el.innerHTML = tableHtml;
}

function getWeekNumber(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const yearStart = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function avgWeek(bilans, field) {
  const vals = bilans.map(b => parseFloat(b[field])).filter(v => !isNaN(v) && v > 0);
  if (!vals.length) return '-';
  return (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1);
}

// Supprimer un athlète complètement
async function deleteAthlete(athleteId, athleteName) {
  if (!confirm(`Êtes-vous sûr de vouloir supprimer ${athleteName} et TOUTES ses données ?`)) return;

  try {
    console.log('🗑️ Suppression athlète:', athleteId);

    // 1. Supprimer tous les programmes et sessions de cet athlète
    const { error: err1 } = await supabaseClient
      .from('workout_sessions')
      .delete()
      .in('program_id', (await supabaseClient.from('workout_programs').select('id').eq('athlete_id', athleteId)).data?.map(p => p.id) || []);

    const { error: err2 } = await supabaseClient
      .from('workout_programs')
      .delete()
      .eq('athlete_id', athleteId);

    // 2. Supprimer tous les plans de nutrition
    const { error: err3 } = await supabaseClient
      .from('nutrition_plans')
      .delete()
      .eq('athlete_id', athleteId);

    // 3. Supprimer l'athlète lui-même
    const { error: err4 } = await supabaseClient
      .from('athletes')
      .delete()
      .eq('id', athleteId);

    if (err1 || err2 || err3 || err4) {
      throw new Error((err1 || err2 || err3 || err4).message);
    }

    console.log('✅ Athlète supprimé');
    notify(`${athleteName} a été supprimé !`, 'success');
    showSection('athletes');
    loadAthletes();

  } catch (error) {
    console.error('❌ Erreur suppression:', error);
    notify('Erreur: ' + error.message, 'error');
  }
}

}

function buildEsExerciseHtml(idx, ex) {
  const inpStyle = 'background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);outline:none;font-size:12px;';
  return `
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;">
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 80px;gap:8px;align-items:flex-end;">
        <div>
          <label style="font-size:11px;color:var(--text3);">Exercice</label>
          <input type="text" id="es-ex-nom-${idx}" value="${esEsc(ex.nom||'')}" placeholder="Nom de l'exercice" style="${inpStyle};width:100%;">
        </div>
        <div>
          <label style="font-size:11px;color:var(--text3);">Séries</label>
          <input type="number" id="es-ex-series-${idx}" value="${ex.series||3}" min="1" style="${inpStyle};width:100%;text-align:center;">
        </div>
        <div>
          <label style="font-size:11px;color:var(--text3);">Reps</label>
          <input type="number" id="es-ex-reps-${idx}" value="${ex.reps||8}" min="1" style="${inpStyle};width:100%;text-align:center;">
        </div>
        <div>
          <label style="font-size:11px;color:var(--text3);">Charge (kg)</label>
          <input type="number" id="es-ex-charge-${idx}" value="${ex.charge||''}" placeholder="0" step="0.5" style="${inpStyle};width:100%;text-align:center;">
        </div>
        <button type="button" class="btn btn-outline btn-sm" onclick="removeEsExercise(${idx})" style="color:var(--danger);padding:6px 10px;"><i class="fas fa-trash"></i></button>
      </div>
    </div>`;
}

function addEsExercise() {
  const container = document.getElementById('es-exercises');
  const idx = window._esExercises.length;
  const newEx = { nom: '', series: 3, reps: 8, charge: null };
  window._esExercises.push(newEx);

  if (container.textContent.includes('Aucun exercice')) {
    container.innerHTML = '';
  }

  container.insertAdjacentHTML('beforeend', buildEsExerciseHtml(idx, newEx));
}

function removeEsExercise(idx) {
  window._esExercises.splice(idx, 1);
  
  const container = document.getElementById('es-exercises');
  container.innerHTML = window._esExercises.length ? 
    window._esExercises.map((ex, i) => buildEsExerciseHtml(i, ex)).join('') : 
    '<div style="color:var(--text3);font-size:12px;padding:16px;text-align:center;">Aucun exercice pour le moment</div>';
}

async function saveSessionDetailInline() {
  const nom = document.getElementById('es-nom').value.trim();
  const jour = document.getElementById('es-jour').value.trim();
  
  if (!nom) {
    notify('Veuillez entrer un nom de séance', 'warning');
    return;
  }
  
  // Récupérer les exercices du formulaire
  const exercises = [];
  for (let i = 0; i < window._esExercises.length; i++) {
    const nomInput = document.getElementById(`es-ex-nom-${i}`);
    if (!nomInput) break;
    
    exercises.push({
      nom: nomInput.value.trim(),
      series: parseInt(document.getElementById(`es-ex-series-${i}`).value) || 0,
      reps: parseInt(document.getElementById(`es-ex-reps-${i}`).value) || 0,
      charge: parseFloat(document.getElementById(`es-ex-charge-${i}`).value) || null
    });
  }
  
  const { error } = await supabaseClient
    .from('workout_sessions')
    .update({
      nom,
      jour,
      exercices: JSON.stringify(exercises)
    })
    .eq('id', window._esEditId);
  
  if (error) {
    notify('Erreur: ' + error.message, 'error');
    return;
  }
  
  notify('Séance enregistrée !', 'success');
  viewSessionDetail(window._esEditId, window._esProgramId);
}

async function removeExercise(sessionId, exerciseIdx, programId) {
  const { data: session } = await supabaseClient.from('workout_sessions').select('exercices').eq('id', sessionId).single();
  let exs = [];
  try { exs = typeof session?.exercices === 'string' ? JSON.parse(session.exercices) : (session?.exercices || []); } catch(e) {}
  exs.splice(exerciseIdx, 1);
  await supabaseClient.from('workout_sessions').update({ exercices: JSON.stringify(exs) }).eq('id', sessionId);
  loadAthleteTabTraining();
}

// ===== ALIMENT EDIT/DELETE =====
document.getElementById('edit-aliment-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const { error } = await supabaseClient.from('aliments_db').update({
    nom: document.getElementById('edit-aliment-nom').value,
    calories: parseFloat(document.getElementById('edit-aliment-calories').value),
    proteines: parseFloat(document.getElementById('edit-aliment-proteines').value) || 0,
    glucides: parseFloat(document.getElementById('edit-aliment-glucides').value) || 0,
    lipides: parseFloat(document.getElementById('edit-aliment-lipides').value) || 0
  }).eq('id', window._editAlimentId);
  if (error) { notify('Erreur: ' + error.message, 'error'); return; }
  notify('Aliment modifié !', 'success');
  closeModal('modal-edit-aliment');
  loadAliments();
});

async function deleteAliment(id) {
  if (!confirm('Supprimer cet aliment ?')) return;
  await supabaseClient.from('aliments_db').delete().eq('id', id);
  closeModal('modal-edit-aliment');
  notify('Aliment supprimé !', 'success');
  loadAliments();
}

// ===== TEMPLATE COPY =====
async function copyTrainingFromTemplate() {
  const { data: templates } = await supabaseClient.from('training_templates').select('*').eq('coach_id', currentUser.id);
  if (!templates?.length) { notify('Aucun template disponible', 'error'); return; }
  showTemplateSelector('training', templates).then(id => { if (id) copyWorkoutTemplate(id); });
}

async function copyNutritionFromTemplateForType(mealType) {
  const { data: templates } = await supabaseClient.from('nutrition_templates').select('*').eq('coach_id', currentUser.id);
  if (!templates?.length) { notify('Aucun template disponible', 'error'); return; }
  showTemplateSelector('nutrition', templates).then(id => { if (id) copyNutritionTemplateWithType(id, mealType); });
}

function showTemplateSelector(type, templates) {
  return new Promise(resolve => {
    const list = document.getElementById('template-selector-list');
    list.innerHTML = templates.map(t => `
      <div class="card athlete-card" style="margin-bottom:8px;padding:16px;" onclick="resolveTemplateSelection('${t.id}')">
        <div style="font-weight:600;">${t.nom}</div>
        ${type === 'nutrition' ? `<div style="font-size:12px;color:var(--text3);">${t.calories_objectif||0} kcal | P:${t.proteines||0}g G:${t.glucides||0}g L:${t.lipides||0}g</div>` : ''}
        ${type === 'training' ? `<div style="font-size:12px;color:var(--text3);">${t.description||''}</div>` : ''}
      </div>`).join('');
    window._templateSelectorResolve = (id) => { closeModal('modal-template-selector'); resolve(id); };
    window._templateSelectorResolveNull = () => { closeModal('modal-template-selector'); resolve(null); };
    openModal('modal-template-selector');
  });
}

function resolveTemplateSelection(id) {
  if (window._templateSelectorResolve) window._templateSelectorResolve(id);
}

async function copyNutritionTemplateWithType(templateId, mealType) {
  const { data: template, error } = await supabaseClient.from('nutrition_templates').select('*').eq('id', templateId).single();
  if (error) { notify('Erreur: ' + error.message, 'error'); return; }
  const { error: insertError } = await supabaseClient.from('nutrition_plans').insert({
    nom: template.nom,
    athlete_id: currentAthleteId,
    coach_id: currentUser.id,
    calories_objectif: template.calories_objectif,
    proteines: template.proteines,
    glucides: template.glucides,
    lipides: template.lipides,
    meal_type: mealType || window.currentNutriTab || 'training',
    repas_detail: template.repas_detail,
    meals_data: template.meals_data || null
  }).select();
  if (insertError) { notify('Erreur: ' + insertError.message, 'error'); return; }
  notify('Template copié !', 'success');
  loadAthleteTabNutrition();
}

// ===== INLINE NUTRITION PLAN EDITOR =====
function npEsc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function buildNpFoodOptions() {
  window._npFoodOptions = (window.alimentsDB || []).map(a =>
    `<option value="${a.id}" data-cal="${a.calories||0}" data-prot="${a.proteines||0}" data-gluc="${a.glucides||0}" data-lip="${a.lipides||0}">${npEsc(a.nom)}</option>`
  ).join('');
}

function buildNpFoodHtml(item) {
  const opts = '<option value="">— aliment —</option>' + (window.alimentsDB || []).map(a => {
    const sel = (item && item.aliment === a.nom) ? ' selected' : '';
    return `<option value="${a.id}"${sel} data-cal="${a.calories||0}" data-prot="${a.proteines||0}" data-gluc="${a.glucides||0}" data-lip="${a.lipides||0}">${npEsc(a.nom)}</option>`;
  }).join('');
  const inp = 'background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;text-align:center;';
  const ro = 'background:var(--bg4);border:none;border-radius:6px;padding:5px 8px;color:var(--text3);font-size:12px;text-align:center;';
  return `
    <div class="food-item np-food-row" style="flex-wrap:wrap;gap:6px;margin-bottom:6px;">
      <select style="flex:2;min-width:150px;${inp.replace('text-align:center;','')}" onchange="calcNpMacros(this)">
        ${opts}
      </select>
      <input type="number" class="np-qty" value="${item?.qte||''}" placeholder="g" style="width:65px;${inp}" oninput="calcNpMacros(this)">
      <input type="text" class="np-kcal" value="${item?.kcal||''}" readonly placeholder="kcal" style="width:55px;${ro}">
      <input type="text" class="np-p" value="${item?.p||''}" readonly placeholder="P" style="width:40px;${ro}">
      <input type="text" class="np-g" value="${item?.g||''}" readonly placeholder="G" style="width:40px;${ro}">
      <input type="text" class="np-l" value="${item?.l||''}" readonly placeholder="L" style="width:40px;${ro}">
      <button type="button" class="btn btn-outline btn-sm" style="color:var(--danger);" onclick="this.closest('.np-food-row').remove();updateNpTotals()">×</button>
    </div>`;
}

function buildNpMealHtml(n, items) {
  const foodsHtml = (items && items.length > 0 ? items : [null]).map(item => buildNpFoodHtml(item)).join('');
  return `
    <div class="meal-row np-meal-row" style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="meal-header np-meal-label" style="margin-bottom:0;">R${n}</div>
          <span class="np-meal-totals" style="font-size:12px;color:var(--text3);"></span>
        </div>
        <div style="display:flex;gap:6px;">
          <button type="button" class="btn btn-outline btn-sm" onclick="copyNpMeal(this)" title="Copier ce repas"><i class="fas fa-copy"></i></button>
          <button type="button" class="btn btn-outline btn-sm" onclick="pasteNpMeal(this)" title="Coller repas copié"><i class="fas fa-paste"></i></button>
          <button type="button" class="btn btn-outline btn-sm" style="color:var(--danger);" onclick="removeNpMeal(this)">Supprimer</button>
        </div>
      </div>
      <div class="np-foods-list">${foodsHtml}</div>
      <button type="button" class="btn btn-outline btn-sm" style="margin-top:6px;" onclick="this.previousElementSibling.insertAdjacentHTML('beforeend', buildNpFoodHtml(null))">
        <i class="fas fa-plus"></i> Aliment
      </button>
    </div>`;
}

function addNpMeal() {
  const c = document.getElementById('np-meals');
  if (!c) return;
  const n = c.querySelectorAll('.np-meal-row').length + 1;
  c.insertAdjacentHTML('beforeend', buildNpMealHtml(n, []));
}

function removeNpMeal(btn) {
  const c = document.getElementById('np-meals');
  if (c.querySelectorAll('.np-meal-row').length <= 1) { notify('Minimum 1 repas', 'warning'); return; }
  btn.closest('.np-meal-row').remove();
  c.querySelectorAll('.np-meal-label').forEach((lbl, i) => { lbl.textContent = 'R' + (i+1); });
  updateNpTotals();
}

function calcNpMacros(el) {
  const row = el.closest('.np-food-row');
  if (!row) return;
  const sel = row.querySelector('select');
  const qte = parseFloat(row.querySelector('.np-qty')?.value) || 0;
  if (!sel?.value) return;
  const opt = sel.options[sel.selectedIndex];
  const f = (k) => parseFloat(opt.dataset[k]) || 0;
  row.querySelector('.np-kcal').value = (f('cal') * qte).toFixed(0);
  row.querySelector('.np-p').value = (f('prot') * qte).toFixed(1);
  row.querySelector('.np-g').value = (f('gluc') * qte).toFixed(1);
  row.querySelector('.np-l').value = (f('lip') * qte).toFixed(1);
  updateNpTotals();
}

function updateNpTotals() {
  let tk = 0, tp = 0, tg = 0, tl = 0;
  document.querySelectorAll('#np-meals .np-meal-row').forEach(mealRow => {
    let k = 0, p = 0, g = 0, l = 0;
    mealRow.querySelectorAll('.np-food-row').forEach(fr => {
      k += parseFloat(fr.querySelector('.np-kcal')?.value) || 0;
      p += parseFloat(fr.querySelector('.np-p')?.value)    || 0;
      g += parseFloat(fr.querySelector('.np-g')?.value)    || 0;
      l += parseFloat(fr.querySelector('.np-l')?.value)    || 0;
    });
    tk += k; tp += p; tg += g; tl += l;
    const tot = mealRow.querySelector('.np-meal-totals');
    if (tot) tot.textContent = k > 0 ? `${k.toFixed(0)} kcal · P${p.toFixed(1)} G${g.toFixed(1)} L${l.toFixed(1)}` : '';
  });
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  set('np-cal',  tk.toFixed(0));
  set('np-prot', tp.toFixed(1));
  set('np-gluc', tg.toFixed(1));
  set('np-lip',  tl.toFixed(1));
}

function copyNpMeal(btn) {
  const mealRow = btn.closest('.np-meal-row');
  const foods = [];
  mealRow.querySelectorAll('.np-food-row').forEach(fr => {
    const sel = fr.querySelector('select');
    const opt = sel ? sel.options[sel.selectedIndex] : null;
    const nom = opt?.text;
    if (!nom || nom === '— aliment —') return;
    foods.push({
      aliment: nom,
      qte: parseFloat(fr.querySelector('.np-qty')?.value) || 0,
      cal:  parseFloat(opt?.dataset?.cal)  || 0,
      prot: parseFloat(opt?.dataset?.prot) || 0,
      gluc: parseFloat(opt?.dataset?.gluc) || 0,
      lip:  parseFloat(opt?.dataset?.lip)  || 0,
    });
  });
  window._npClipboard = foods;
  notify('Repas copié', 'success');
}

function pasteNpMeal(btn) {
  if (!window._npClipboard || !window._npClipboard.length) { notify('Aucun repas copié', 'warning'); return; }
  const mealRow = btn.closest('.np-meal-row');
  const list = mealRow.querySelector('.np-foods-list');
  const items = window._npClipboard.map(f => ({
    aliment: f.aliment,
    qte: f.qte,
    kcal: parseFloat((f.cal * f.qte).toFixed(0)),
    p:    parseFloat((f.prot * f.qte).toFixed(1)),
    g:    parseFloat((f.gluc * f.qte).toFixed(1)),
    l:    parseFloat((f.lip  * f.qte).toFixed(1)),
  }));
  list.innerHTML = items.map(item => buildNpFoodHtml(item)).join('');
  list.querySelectorAll('.np-food-row').forEach(row => {
    const sel = row.querySelector('select');
    if (sel && sel.value) calcNpMacros(sel);
  });
  notify('Repas collé', 'success');
}

function getNpMealData() {
  const meals = [];
  document.querySelectorAll('#np-meals .np-meal-row').forEach(row => {
    const foods = [];
    row.querySelectorAll('.np-food-row').forEach(fr => {
      const sel = fr.querySelector('select');
      const opt = sel ? sel.options[sel.selectedIndex] : null;
      const nom = opt?.text;
      if (!nom || nom === '— aliment —') return;
      const qte = parseFloat(fr.querySelector('.np-qty')?.value) || 0;
      const cal  = parseFloat(opt?.dataset?.cal)  || 0;
      const prot = parseFloat(opt?.dataset?.prot) || 0;
      const gluc = parseFloat(opt?.dataset?.gluc) || 0;
      const lip  = parseFloat(opt?.dataset?.lip)  || 0;
      foods.push({
        aliment: nom,
        qte,
        kcal: parseFloat((cal  * qte).toFixed(0)),
        p:    parseFloat((prot * qte).toFixed(1)),
        g:    parseFloat((gluc * qte).toFixed(1)),
        l:    parseFloat((lip  * qte).toFixed(1))
      });
    });
    meals.push(foods);
  });
  return meals;
}

async function saveNutritionPlanInline() {
  const nom = document.getElementById('np-nom')?.value?.trim();
  if (!nom) { notify('Le nom est obligatoire', 'error'); return; }
  const planData = {
    nom,
    calories_objectif: Math.round(parseFloat(document.getElementById('np-cal')?.textContent) || 0),
    proteines: Math.round(parseFloat(document.getElementById('np-prot')?.textContent) || 0),
    glucides: Math.round(parseFloat(document.getElementById('np-gluc')?.textContent) || 0),
    lipides: Math.round(parseFloat(document.getElementById('np-lip')?.textContent) || 0),
    meals_data: JSON.stringify(getNpMealData()),
    meal_type: window._npMealType || 'training'
  };
  let error;
  if (window._npEditId) {
    ({ error } = await supabaseClient.from('nutrition_plans').update(planData).eq('id', window._npEditId));
  } else {
    ({ error } = await supabaseClient.from('nutrition_plans').insert({ ...planData, athlete_id: currentAthleteId, coach_id: currentUser.id }));
  }
  if (error) { notify('Erreur: ' + error.message, 'error'); return; }
  notify('Plan sauvegardé !', 'success');
  window._npEditId = null;
  loadAthleteTabNutrition();
}

// Vérifier la session au chargement
async function checkSession() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  
  if (session) {
    currentUser = session.user;
    showApp();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
  }
}

// Initialisation
checkSession();
</script>
